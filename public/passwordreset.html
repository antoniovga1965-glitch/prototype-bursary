<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
</head>
<body >
    <div class="mx-auto max-w-3xl rounded-lg border-2 border-black p-4 bg-stone-200 mt-4">
<h1 class="text-black text-center text-2xl font-bold font-serif">Password Reset</h1>
<label class="block text-xs font-bold text-gray-600 uppercase tracking-wide mb-1" for="password">Password</label>
<input type="password" id="password" placeholder="Enter password" 
class="w-full px-4 py-3 border border-gray-200 py-4 rounded-xl bg-gray-50 focus:outline-none focus:border-green-700 focus:ring-2 focus:ring-green-100 transition text-sm">

<label class="block text-xs font-bold text-gray-600 uppercase tracking-wide mb-1 my-2" for="password">Confirm Password</label>
<input type="password" id="confirmpassword" placeholder="Re-Enter password" 
class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:border-green-700 focus:ring-2 focus:ring-green-100 transition text-sm">

<button  class=" px-3  flex mx-auto py-2 bg-blue-800 hover:bg-blue-500 text-white font-bold my-2 rounded-xl transition" id="savebtn">Save</button>
<p class="font-bold text-black" id="results"></p>
</div>
 <script>

    const password = document.getElementById('password');
    const confirmpassword  =document.getElementById('confirmpassword');
    const savebtn = document.getElementById('savebtn');
    const results  = document.getElementById('results');

    savebtn.addEventListener('click',()=>{
        const PASSWORD = password.value.trim();
        const COnfirmpass = confirmpassword.value.trim();

        if(!PASSWORD||!COnfirmpass){
            results.textContent = 'please set a new password';
        }
        else if(PASSWORD!==COnfirmpass){
        results.textContent = 'Password do not match';

        setTimeout(() => {
             results.classList.add('hidden');
        }, 4000);
        return;
        }
        const token  = new URLSearchParams(window.location.search).get('token')

        fetch('/emailsend/savenewpassword',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({token,PASSWORD})
        }).then(res=>res.json())
        .then(data=>{
            results.textContent = data.message;
            setTimeout(() => {
                results.classList.add('hidden');
            }, 5000);
        })
        .catch(err=>{
            console.log(err);
            
        })
        password.value="";
        confirmpassword.value="";
        
    })
 </script>
</body>
</html>
